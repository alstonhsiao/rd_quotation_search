name: 同步 Google Sheets 到 JSON

on:
  schedule:
    # 每天 09:00 和 21:00 UTC (等於台北時間 17:00 和 05:00)
    - cron: '0 9,21 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install gspread oauth2client
    
    - name: Create service account file
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: |
        echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > service_account.json
    
    - name: Sync Google Sheets to JSON
      run: |
        python sync_sheets_to_json.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add quotations.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Auto-sync: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
